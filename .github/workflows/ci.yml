# =============================================================================
# Selection Room - Continuous Integration
# =============================================================================

name: CI

on:
  push:
    branches: [ main, develop, selection-room ]
  pull_request:
    branches: [ main, develop ]

jobs:
  engine:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[app,dev]"

    - name: Lint with flake8
      run: |
        flake8 src/ app/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Check code formatting with Black
      run: black --check src/ tests/ app/

    - name: Check import sorting with isort
      run: isort --check-only src/ tests/ app/

    - name: Run tests with pytest
      run: pytest tests/ -v --cov=src --cov-report=term-missing

    - name: Sample pipeline smoke run (incl. JSON export)
      run: |
        python -m src.cli.main run --year 2025 --week 15 --sample
        test -f data/output/api/runs.json

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
    - uses: actions/checkout@v4

    - uses: pnpm/action-setup@v4
      with:
        version: 11

    - uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: pnpm
        cache-dependency-path: web/pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Lint
      run: pnpm lint

    - name: Type check
      run: pnpm exec tsc --noEmit

    - name: Build
      run: pnpm build
